# Keycloak + PostgreSQL — realmek és felhasználók a Postgres-ben maradnak (volume).
#
# Indítás (projekt gyökérből):
#   docker compose -f docker-compose.keycloak.yml up -d
# Leállítás (adat MEGMARAD):
#   docker compose -f docker-compose.keycloak.yml down
# Adat TÖRLÉSE (új, üres Keycloak):
#   docker compose -f docker-compose.keycloak.yml down -v
#
# Első indulás 1–3 perc is lehet (adatbázis séma). Admin: http://localhost:8080/admin
# Jelszavak fejlesztéshez vannak — élesben secrets / erős jelszó.
#
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command:
      - start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_ENABLED: "true"
      # Lokális böngésző + SPA; az issuer URL legyen kiszámítható
      KC_HOSTNAME: http://localhost:8080
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  keycloak_pg_data:
